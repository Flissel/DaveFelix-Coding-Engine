syntax = "proto3";

package agent_worker;

// Service für MCP Agent Worker
// Jeder Agent (filesystem, docker, redis, etc.) implementiert diesen Service
service AgentWorker {
    // Führe eine Aufgabe aus
    rpc ExecuteTask(TaskRequest) returns (TaskResponse);

    // Streame Task-Fortschritt (für lange Tasks)
    rpc ExecuteTaskStream(TaskRequest) returns (stream TaskProgress);

    // Health Check
    rpc HealthCheck(Empty) returns (HealthResponse);

    // Hole Agent-Informationen
    rpc GetAgentInfo(Empty) returns (AgentInfo);
}

// Leere Nachricht
message Empty {}

// Task-Anfrage
message TaskRequest {
    string task_id = 1;              // Eindeutige Task-ID (generiert wenn leer)
    string description = 2;          // Task-Beschreibung für den Agent
    string task_type = 3;            // Optional: spezifischer Task-Typ
    string parameters_json = 4;      // JSON-kodierte Parameter
    int32 timeout_seconds = 5;       // Timeout (0 = default)
}

// Task-Antwort
message TaskResponse {
    string task_id = 1;
    TaskStatus status = 2;
    string message = 3;              // Ergebnis oder Fehlermeldung
    string result_json = 4;          // JSON-kodiertes Detailergebnis
    int64 duration_ms = 5;           // Ausführungsdauer in Millisekunden
    repeated ToolCall tool_calls = 6; // Ausgeführte Tool Calls
}

// Task-Status
enum TaskStatus {
    PENDING = 0;
    IN_PROGRESS = 1;
    COMPLETED = 2;
    FAILED = 3;
    CANCELLED = 4;
}

// Task-Fortschritt für Streaming
message TaskProgress {
    string task_id = 1;
    TaskStatus status = 2;
    string message = 3;
    int32 progress_percent = 4;      // 0-100
    string current_step = 5;         // Aktuelle Aktion
    ToolCall current_tool = 6;       // Aktueller Tool Call (wenn vorhanden)
}

// Tool Call Information
message ToolCall {
    string tool_name = 1;
    string arguments_json = 2;
    string result_json = 3;
    int64 duration_ms = 4;
}

// Health Check Antwort
message HealthResponse {
    bool healthy = 1;
    string status = 2;               // "ready", "busy", "error"
    int32 active_tasks = 3;
    string version = 4;
}

// Agent-Informationen
message AgentInfo {
    string name = 1;                 // z.B. "filesystem", "docker"
    string description = 2;
    string version = 3;
    repeated string capabilities = 4; // Liste der Fähigkeiten
    repeated string tools = 5;       // Verfügbare Tools
    int32 grpc_port = 6;
}
