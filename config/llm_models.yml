# config/llm_models.yml — SINGLE SOURCE OF TRUTH for all LLM models
# Edit THIS file to change any model globally across the entire system.
#
# Roles:
#   primary      - Anthropic SDK direct (base agent, vision, monitor)
#   cli          - Claude CLI / Kilo CLI --model flag
#   mcp_standard - AutoGen teams, EventFix orchestrator, task executor
#   mcp_agent    - Individual MCP plugin agents (filesystem, docker, etc.)
#   judge        - MCMP judge, fungus agents, differential analysis
#   reasoning    - Complex reasoning, architecture analysis
#   enrichment   - Phase 30 schema discovery, task mapping
#
# Override any model via environment variable:
#   LLM_MODEL_PRIMARY=claude-opus-4-20250514
#   LLM_MODEL_JUDGE=anthropic/claude-sonnet-4.5
#   etc.

providers:
  anthropic:
    base_url: null
    api_key_env: ANTHROPIC_API_KEY
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
models:
  primary:
    provider: openrouter
    model: qwen/qwen3-coder:free
    max_tokens: 16384
    description: Anthropic SDK direct — base agent, vision analysis, monitor
  cli:
    provider: openrouter
    model: qwen/qwen3-coder:free
    max_tokens: 16384
    description: Claude CLI --model flag (must be Anthropic-native name, not OpenRouter
      format)
  mcp_standard:
    provider: openrouter
    model: qwen/qwen3-coder:free
    max_tokens: 8192
    description: AutoGen teams, EventFix orchestrator, task executor, LLM search
  mcp_agent:
    provider: openrouter
    model: qwen/qwen3-coder:free
    max_tokens: 8192
    description: Individual MCP plugin agents (filesystem, docker, prisma, etc.)
  judge:
    provider: openrouter
    model: nvidia/nemotron-3-super-120b-a12b:free
    max_tokens: 8192
    description: MCMP judge, fungus agents, differential analysis, MCP planner
  reasoning:
    provider: openrouter
    model: nvidia/nemotron-3-super-120b-a12b:free
    max_tokens: 16384
    description: Complex reasoning, architecture analysis
  enrichment:
    provider: openrouter
    model: qwen/qwen3-next-80b-a3b-instruct:free
    max_tokens: 8192
    description: Phase 30 schema discovery and task mapping
