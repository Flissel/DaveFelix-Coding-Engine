[supervisord]
nodaemon=true
user=root
logfile=/var/log/validation/supervisord.log
pidfile=/var/run/supervisord.pid

[program:frontend]
command=serve -s /app/static -l 3100
directory=/app
user=validation
autostart=true
autorestart=true
stderr_logfile=/var/log/validation/frontend.err.log
stdout_logfile=/var/log/validation/frontend.out.log
environment=NODE_ENV="production"

[program:backend]
command=uvicorn src.api.main:app --host 0.0.0.0 --port 8100 --workers 1
directory=/app
user=validation
autostart=true
autorestart=true
stderr_logfile=/var/log/validation/backend.err.log
stdout_logfile=/var/log/validation/backend.out.log
environment=PYTHONUNBUFFERED="1",PYTHONPATH="/app"