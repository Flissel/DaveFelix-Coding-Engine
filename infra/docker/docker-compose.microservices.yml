# Docker Compose for Microservices Architecture
# Generated by Coding Engine for cloud-ready deployment
#
# Usage:
#   docker-compose -f docker-compose.microservices.yml up -d
#
# Services:
#   - auth-service: Authentication, authorization, RBAC
#   - user-service: User profiles, settings, notifications
#   - transport-service: Transport tracking, GPS, routes
#   - pod-service: POD management, documents, reports
#   - billing-service: Billing, invoicing, payments
#   - orders-service: Order management, scheduling
#   - partners-service: Partner/vendor management
#   - gateway-service: API Gateway, integrations, search
#   - redis: Event bus for inter-service communication

version: "3.9"

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ============================================
  # Microservices
  # ============================================

  auth-service:
    build:
      context: ../../output/services/auth-service
      dockerfile: Dockerfile
    container_name: logistics-auth-service
    ports:
      - "3100:3000"   # Frontend
      - "8100:8000"   # Backend API
    networks:
      - microservices-net
    environment:
      SERVICE_NAME: auth-service
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  user-service:
    build:
      context: ../../output/services/user-service
      dockerfile: Dockerfile
    container_name: logistics-user-service
    ports:
      - "3101:3000"
      - "8101:8000"
    networks:
      - microservices-net
    environment:
      SERVICE_NAME: user-service
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8000
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  transport-service:
    build:
      context: ../../output/services/transport-service
      dockerfile: Dockerfile
    container_name: logistics-transport-service
    ports:
      - "3102:3000"
      - "8102:8000"
    networks:
      - microservices-net
    environment:
      SERVICE_NAME: transport-service
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8000
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  pod-service:
    build:
      context: ../../output/services/pod-service
      dockerfile: Dockerfile
    container_name: logistics-pod-service
    ports:
      - "3103:3000"
      - "8103:8000"
    networks:
      - microservices-net
    environment:
      SERVICE_NAME: pod-service
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8000
      TRANSPORT_SERVICE_URL: http://transport-service:8000
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      transport-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  partners-service:
    build:
      context: ../../output/services/partners-service
      dockerfile: Dockerfile
    container_name: logistics-partners-service
    ports:
      - "3106:3000"
      - "8106:8000"
    networks:
      - microservices-net
    environment:
      SERVICE_NAME: partners-service
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8000
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  orders-service:
    build:
      context: ../../output/services/orders-service
      dockerfile: Dockerfile
    container_name: logistics-orders-service
    ports:
      - "3105:3000"
      - "8105:8000"
    networks:
      - microservices-net
    environment:
      SERVICE_NAME: orders-service
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8000
      PARTNERS_SERVICE_URL: http://partners-service:8000
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      partners-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  billing-service:
    build:
      context: ../../output/services/billing-service
      dockerfile: Dockerfile
    container_name: logistics-billing-service
    ports:
      - "3104:3000"
      - "8104:8000"
    networks:
      - microservices-net
    environment:
      SERVICE_NAME: billing-service
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8000
      ORDERS_SERVICE_URL: http://orders-service:8000
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  gateway-service:
    build:
      context: ../../output/services/gateway-service
      dockerfile: Dockerfile
    container_name: logistics-gateway-service
    ports:
      - "3107:3000"
      - "8107:8000"
    networks:
      - microservices-net
    environment:
      SERVICE_NAME: gateway-service
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8000
      NODE_ENV: production
      # Service discovery for routing
      USER_SERVICE_URL: http://user-service:8000
      TRANSPORT_SERVICE_URL: http://transport-service:8000
      POD_SERVICE_URL: http://pod-service:8000
      BILLING_SERVICE_URL: http://billing-service:8000
      ORDERS_SERVICE_URL: http://orders-service:8000
      PARTNERS_SERVICE_URL: http://partners-service:8000
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

# ============================================
# Networks
# ============================================

networks:
  microservices-net:
    driver: bridge
    name: logistics-microservices
    ipam:
      config:
        - subnet: 172.30.0.0/16

# ============================================
# Volumes
# ============================================

volumes:
  redis_data:
    name: logistics-redis-data
