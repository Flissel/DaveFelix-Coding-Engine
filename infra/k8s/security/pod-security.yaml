# Cell Colony Pod Security Configuration
# Implements security contexts for all cell pods

---
# ResourceQuota for cell-colony namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cell-colony-quota
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: resource-management
spec:
  hard:
    # Limit total resources
    requests.cpu: "100"
    requests.memory: 200Gi
    limits.cpu: "200"
    limits.memory: 400Gi
    # Limit number of objects
    pods: "500"
    services: "200"
    configmaps: "500"
    secrets: "200"
    persistentvolumeclaims: "100"
    # Count of cells
    count/cells.colony.codingengine.io: "200"

---
# LimitRange for cell pods
apiVersion: v1
kind: LimitRange
metadata:
  name: cell-limits
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: resource-management
spec:
  limits:
    # Default container limits
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 10m
        memory: 32Mi
    # Pod-level limits
    - type: Pod
      max:
        cpu: "8"
        memory: 16Gi

---
# Default security context for cell deployments
# Apply via Kyverno/OPA Gatekeeper or use as template
apiVersion: v1
kind: ConfigMap
metadata:
  name: cell-security-context-template
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: security
data:
  pod-security-context.yaml: |
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
      supplementalGroups:
        - 1000

  container-security-context.yaml: |
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1000

  restricted-security-context.yaml: |
    # Most restrictive settings for sensitive cells
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 65534  # nobody user
      seccompProfile:
        type: RuntimeDefault

