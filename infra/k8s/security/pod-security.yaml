---
# PriorityClass for system components
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: cell-colony-system
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: scheduling
value: 1000000
globalDefault: false
description: "Priority class for Cell Colony system components"

---
# PriorityClass for regular cells
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: cell-colony-cell
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: scheduling
value: 100000
globalDefault: false
description: "Priority class for Cell Colony cells"
preemptionPolicy: PreemptLowerPriority

---
# PriorityClass for batch/build jobs
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: cell-colony-batch
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: scheduling
value: 10000
globalDefault: false
description: "Priority class for Cell Colony batch jobs"
preemptionPolicy: Never
