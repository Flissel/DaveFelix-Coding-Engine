# Cell Colony RBAC Configuration
# Implements least-privilege access for all components

---
# Namespace for Cell Colony
apiVersion: v1
kind: Namespace
metadata:
  name: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    # Pod Security Standards (K8s 1.25+)
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest

---
# ClusterRole for ColonyManager - manages cells across namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: colony-manager-role
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: colony-manager
rules:
  # Manage Cell CRDs
  - apiGroups: ["colony.codingengine.io"]
    resources: ["cells", "cells/status", "colonies", "colonies/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Manage Deployments and Services for cells
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read pods and logs for health checks
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
  # Manage network policies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Manage RBAC for cells
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# ServiceAccount for ColonyManager
apiVersion: v1
kind: ServiceAccount
metadata:
  name: colony-manager-sa
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: colony-manager

---
# ClusterRoleBinding for ColonyManager
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: colony-manager-binding
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: colony-manager
subjects:
  - kind: ServiceAccount
    name: colony-manager-sa
    namespace: cell-colony
roleRef:
  kind: ClusterRole
  name: colony-manager-role
  apiGroup: rbac.authorization.k8s.io

---
# Role for individual cells - minimal permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cell-base-role
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: cell
rules:
  # Read own ConfigMap only (name must match cell name pattern)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  # No access to secrets - use Vault instead
  # Read own status
  - apiGroups: ["colony.codingengine.io"]
    resources: ["cells/status"]
    verbs: ["get"]

---
# Role for Cell Health Monitor
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cell-health-monitor-role
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: health-monitor
rules:
  # Read all cells and their status
  - apiGroups: ["colony.codingengine.io"]
    resources: ["cells", "cells/status"]
    verbs: ["get", "list", "watch"]
  # Update cell status
  - apiGroups: ["colony.codingengine.io"]
    resources: ["cells/status"]
    verbs: ["update", "patch"]
  # Read pods for health probes
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch"]
  # Read services for endpoint health
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]

---
# ServiceAccount for Health Monitor
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cell-health-monitor-sa
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: health-monitor

---
# RoleBinding for Health Monitor
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cell-health-monitor-binding
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: health-monitor
subjects:
  - kind: ServiceAccount
    name: cell-health-monitor-sa
    namespace: cell-colony
roleRef:
  kind: Role
  name: cell-health-monitor-role
  apiGroup: rbac.authorization.k8s.io

---
# Role for Cell Build Pipeline
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cell-builder-role
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: builder
rules:
  # Create pods for build jobs
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Manage ConfigMaps for build configs
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "delete"]
  # Create Secrets for build credentials (short-lived)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete"]

---
# ServiceAccount for Cell Builder
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cell-builder-sa
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: builder

---
# RoleBinding for Cell Builder
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cell-builder-binding
  namespace: cell-colony
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: builder
subjects:
  - kind: ServiceAccount
    name: cell-builder-sa
    namespace: cell-colony
roleRef:
  kind: Role
  name: cell-builder-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole for reading CRD definitions (for operator)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crd-reader-role
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: operator
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

---
# AggregatedClusterRole for viewing cells (for dashboard users)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cell-viewer-role
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: viewer
    # Aggregate to built-in view role
    rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
  - apiGroups: ["colony.codingengine.io"]
    resources: ["cells", "colonies"]
    verbs: ["get", "list", "watch"]

---
# AggregatedClusterRole for editing cells (for operators)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cell-editor-role
  labels:
    app.kubernetes.io/name: cell-colony
    app.kubernetes.io/component: editor
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
rules:
  - apiGroups: ["colony.codingengine.io"]
    resources: ["cells", "colonies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
