# =============================================================================
# VNC Reverse Proxy Configuration for VibeMind Live Preview
# =============================================================================
#
# This configuration enables HTTPS access to VNC preview containers
# via a reverse proxy. Each project gets a unique path.
#
# Usage in .env:
#   VNC_BASE_URL=https://preview.vibemind.io/vnc
#
# URL Format:
#   https://preview.vibemind.io/vnc/{project_id}
#
# =============================================================================

# Upstream für dynamische Container (wird via Consul/etcd/DNS Discovery gefüllt)
# Alternativ: statische Konfiguration pro Container
upstream vnc_backends {
    # Dynamisches Load Balancing
    # server localhost:6080;
    # server localhost:6081;
    # ...
    
    # Für einzelne Instanz:
    server 127.0.0.1:6080;
}

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name preview.vibemind.io;
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server mit VNC Proxy
server {
    listen 443 ssl http2;
    server_name preview.vibemind.io;
    
    # SSL Konfiguration
    ssl_certificate /etc/nginx/ssl/preview.vibemind.io.crt;
    ssl_certificate_key /etc/nginx/ssl/preview.vibemind.io.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Root für statische Dateien (noVNC client)
    root /var/www/novnc;
    
    # ==========================================================================
    # VNC Preview Endpoints
    # ==========================================================================
    
    # VNC Preview mit Project ID
    # URL: /vnc/{project_id}
    location ~ ^/vnc/([a-zA-Z0-9_-]+)$ {
        set $project_id $1;
        
        # Lookup Port für Project (via API oder Redis)
        # In der Praxis: Lua/NJS Script oder externer Service
        # Hier vereinfacht: fester Port 6080
        
        # Proxy zu noVNC WebSocket
        proxy_pass http://vnc_backends;
        
        # WebSocket Support (kritisch für noVNC!)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Header durchreichen
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Project-ID $project_id;
        
        # Timeouts für lange VNC Sessions
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        
        # Buffer Einstellungen
        proxy_buffering off;
        proxy_buffer_size 4k;
    }
    
    # WebSocket Endpoint für VNC (RFB Protocol)
    location ~ ^/vnc/([a-zA-Z0-9_-]+)/websockify$ {
        set $project_id $1;
        
        proxy_pass http://vnc_backends/websockify;
        
        # WebSocket ist PFLICHT
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Project-ID $project_id;
        
        # Lange Timeouts für VNC
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    
    # noVNC Client Dateien (JS, CSS, etc.)
    location /vnc/static/ {
        alias /var/www/novnc/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # ==========================================================================
    # Health Check & Management
    # ==========================================================================
    
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # Preview Status API (optional, für Monitoring)
    location /api/preview/status {
        # Hier könnte ein interner Service antworten
        proxy_pass http://localhost:8080/preview/status;
    }
}

